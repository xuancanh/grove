<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lume — Read as Thinking</title>
<link rel="stylesheet" href="lume.css" />
<style>
  /* responsive: sidebar on wide, bottom tabs on narrow */
  @media (max-width: 760px) {
    .lume-sidebar { display: none !important; }
    .lume-bottom { display: grid !important; }
    main { padding-bottom: 76px; }
    .lume-cols { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 920px) {
    .lume-cols { grid-template-columns: 1fr !important; }
  }
  /* ── Browse organizer rail → horizontal scroller on narrow screens ── */
  @media (max-width: 900px) {
    .brz-layout { flex-direction: column !important; gap: 20px !important; }
    .brz-main { width: 100% !important; min-width: 0 !important; max-width: 100% !important; }
    .brz-rail { width: 100% !important; }
    .brz-rail-group { margin-top: 0 !important; }
    .brz-rail-group + .brz-rail-group { margin-top: 14px !important; }
    .brz-list { display: flex !important; flex-direction: row !important; gap: 8px !important; overflow-x: auto !important; padding-bottom: 6px !important; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .brz-list::-webkit-scrollbar { display: none; }
    .brz-rail-lbl { display: none !important; }
    .brz-railitem, .brz-newcoll { width: auto !important; flex: none !important; white-space: nowrap; border: 1px solid var(--line) !important; background: var(--surface) !important; }
    .brz-railitem > span:nth-child(2) { overflow: visible !important; }
  }
  @media (max-width: 560px) {
    .brz-sel-lbl { display: none !important; }
    .brz-row-topics, .brz-row-status { display: none !important; }
    .brz-ask-lbl { display: none !important; }
    .brz-ask-btn { padding: 10px !important; }
  }
  /* ── Phone refinements ─────────────────────────────────── */
  @media (max-width: 560px) {
    /* Continue-reading hero: stack cover above text, full-width actions */
    .lume-hero { flex-direction: column !important; align-items: flex-start !important; gap: 18px !important; padding: 18px !important; }
    .lume-hero-actions { width: 100% !important; }
    .lume-hero-actions > button { flex: 1 1 0 !important; justify-content: center !important; padding-left: 10px !important; padding-right: 10px !important; }
    /* Screen-header action (e.g. Cards "Study due") goes full width */
    .lume-head { gap: 16px !important; }
    .lume-head-right { width: 100% !important; }
    .lume-head-right > button { width: 100% !important; justify-content: center !important; }
    /* Browse rows: trim the metadata cluster so titles breathe */
    .lume-browse-meta { gap: 12px !important; }
    .lume-browse-notes { display: none !important; }
    /* Memory header stats wrap cleanly */
    .lume-mem-stats { gap: 18px 24px !important; }
  }
  .hover-lift { transition: transform 0.22s cubic-bezier(0.2,0.7,0.2,1), box-shadow 0.22s; }
  .hover-lift:hover { transform: translateY(-3px); }
  .row-hover { transition: background 0.15s; }
  .row-hover:hover { background: var(--surface-2) !important; }
  @keyframes lumeDrawerIn { from { transform: translateX(101%); } to { transform: translateX(0); } }
  input::placeholder, textarea::placeholder { color: var(--ink-3); opacity: 0.8; }
</style>
</head>
<body>
